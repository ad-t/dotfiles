macos_quit_when_last_window_closed yes
macos_show_window_title_in none

modify_font cell_height 5
modify_font cell_width 100%
modify_font baseline -1px
font_size 18

cursor_shape block
cursor_blink_interval 0
sync_to_monitor yes
enable_audio_bell no
window_padding_width 15
hide_window_decorations yes
shell .

# BEGIN_KITTY_THEME
# Kanagawa_dragon
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family="IosevkaTerm Nerd Font Mono" style=Light features="+dlig +ss05"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
